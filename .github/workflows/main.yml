name: Build RDR2 Mod Fork
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install OpenOrbis Toolchain (Fork)
        run: |
          # Usando link direto do binário para evitar erro de index.html
          curl -L https://github.com -o toolchain.tar.gz
          
          # Criar diretório e extrair
          sudo mkdir -p /opt/OpenOrbis/PS4Toolchain
          sudo tar -xvf toolchain.tar.gz -C /opt
          
          # Configurar variáveis de ambiente
          echo "OO_PS4_TOOLCHAIN=/opt/OpenOrbis/PS4Toolchain" >> $GITHUB_ENV

      - name: Build Mod PRX
        run: |
          export PATH=$PATH:$OO_PS4_TOOLCHAIN/bin
          make

      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: JohnBodyguard-Mod-Fork
          path: ./*.prx
