name: Build RDR2 Mod
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install OpenOrbis Toolchain
        run: |
          # Baixa a versão estável v0.5.4
          wget https://github.com
          
          # Garante o diretório e extrai usando o nome correto do arquivo baixado
          sudo mkdir -p /opt/OpenOrbis/PS4Toolchain
          sudo tar -xvf toolchain-llvm-18.tar.gz -C /opt
          
          # Configura o ambiente
          echo "OO_PS4_TOOLCHAIN=/opt/OpenOrbis/PS4Toolchain" >> $GITHUB_ENV

      - name: Build Mod PRX
        run: |
          export PATH=$PATH:$OO_PS4_TOOLCHAIN/bin
          make

      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: JohnBodyguard-Mod
          path: ./*.prx
