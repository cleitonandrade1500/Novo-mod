name: Build RDR2 Mod
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install OpenOrbis Toolchain
        run: |
          # Baixa o arquivo usando o link direto do GitHub Releases
          curl -L -o toolchain.tar.gz https://github.com
          
          # Cria a pasta de destino
          sudo mkdir -p /opt/OpenOrbis/PS4Toolchain
          
          # Extrai o arquivo
          sudo tar -xvf toolchain.tar.gz -C /opt
          
          # Configura a variável de ambiente
          echo "OO_PS4_TOOLCHAIN=/opt/OpenOrbis/PS4Toolchain" >> $GITHUB_ENV

      - name: Build Mod PRX
        run: |
          export PATH=$PATH:$OO_PS4_TOOLCHAIN/bin
          make

      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: JohnBodyguard-Mod
          path: ./*.prx
