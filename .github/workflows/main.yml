name: Build RDR2 Mod
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install OpenOrbis Toolchain
        run: |
          # Baixa o toolchain
          wget https://github.com
          
          # Garante que o diretório de destino existe
          sudo mkdir -p /opt/OpenOrbis/PS4Toolchain
          
          # Extrai o arquivo que foi baixado (independente do nome exato)
          sudo tar -xvf OpenOrbis-PS4-Toolchain.tar.gz -C /opt
          
          # Define a variável de ambiente para os próximos passos
          echo "OO_PS4_TOOLCHAIN=/opt/OpenOrbis/PS4Toolchain" >> $GITHUB_ENV

      - name: Build Mod PRX
        run: |
          # Adiciona o compilador ao PATH e roda o make
          export PATH=$PATH:$OO_PS4_TOOLCHAIN/bin
          make

      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: JohnBodyguard-Mod
          path: ./*.prx
